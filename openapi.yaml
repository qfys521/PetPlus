openapi: 3.0.3
info:
  title: PetPlus API
  description: |
    宠家(PetPlus)宠物健康管理系统API文档

    该API提供了完整的宠物健康管理功能，包括：
    - 用户认证与管理
    - 宠物信息管理
    - 喂食计划与记录
    - 健康档案追踪
    - 环境监测数据

  version: 1.0.0
  contact:
    name: PetPlus Team
    url: https://place.wxtcc.com.cn

servers:
  - url: https://place.wxtcc.com.cn
    description: 生产环境

tags:
  - name: 用户管理
    description: 用户认证和信息管理相关接口
  - name: 宠物管理
    description: 宠物信息的增删改查操作
  - name: 喂食管理
    description: 喂食计划、设备和记录管理
  - name: 健康管理
    description: 宠物健康档案查询
  - name: 环境监测
    description: 环境数据监测

paths:
  /officelease/pets/petsUserLogin:
    post:
      tags:
        - 用户管理
      summary: 用户登录
      description: 用户通过用户名和密码进行登录认证
      operationId: petsUserLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                value:
                  userName: "testuser"
                  psd: "password123"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserBean'
              examples:
                success:
                  value:
                    code: "1"
                    message: "登录成功"
                    data:
                      id: "123"
                      userName: "testuser"
                      email: "test@example.com"
                      phoneNumber: "13800138000"
                      homeAddress: "北京市朝阳区"
                      key: "unique-auth-key-123"
                    timestamp: "2026-03-02T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /officelease/pets/setUserinfo:
    post:
      tags:
        - 用户管理
      summary: 更新用户信息
      description: 更新用户的个人信息，包括邮箱、手机号、地址等
      operationId: setUserinfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserinfoRequest'
            examples:
              updateProfile:
                value:
                  userName: "testuser"
                  email: "newemail@example.com"
                  phoneNumber: "13900139000"
                  homeAddress: "上海市浦东新区"
                  password: "newpassword123"
                  type: "1"
                  key: "unique-auth-key-123"
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: string
              examples:
                success:
                  value:
                    code: "1"
                    message: "更新成功"
                    data: "操作成功"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/getPets:
    get:
      tags:
        - 宠物管理
      summary: 获取宠物列表
      description: 获取指定用户的所有宠物信息
      operationId: getPets
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: 用户认证密钥
          example: "unique-auth-key-123"
        - name: userId
          in: query
          required: false
          schema:
            type: string
            default: "1"
          description: 用户ID
          example: "123"
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PetBean'
              examples:
                success:
                  value:
                    code: "1"
                    message: "查询成功"
                    data:
                      - id: 1
                        userId: 123
                        petName: "小白"
                        petSpecies: "猫"
                        petBreed: "英国短毛猫"
                        petGender: "公"
                        birthDate: "2023-01-15"
                        currentWeight: 4.5
                        healthStatus: "健康"
                        createdAt: "2025-01-01T00:00:00Z"
                        updatedAt: "2026-03-01T00:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/updatePets:
    post:
      tags:
        - 宠物管理
      summary: 更新宠物信息
      description: 更新指定宠物的详细信息
      operationId: updatePets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePetsRequest'
            examples:
              updatePet:
                value:
                  key: "unique-auth-key-123"
                  id: "1"
                  userId: "123"
                  petName: "小白"
                  petSpecies: "猫"
                  petBreed: "英国短毛猫"
                  petGender: "公"
                  birthDate: "2023-01-15"
                  currentweight: "4.8"
                  healthstatus: "健康"
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/feedingSchedules:
    get:
      tags:
        - 喂食管理
      summary: 获取喂食计划
      description: 获取指定宠物的所有喂食计划
      operationId: getFeedingSchedules
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: 用户认证密钥
        - name: petId
          in: query
          required: true
          schema:
            type: string
          description: 宠物ID
          example: "1"
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FeedingSchedulesBean'
              examples:
                success:
                  value:
                    code: "1"
                    message: "查询成功"
                    data:
                      - id: "101"
                        petId: "1"
                        deviceId: "device-001"
                        scheduleTime: "08:00:00"
                        foodAmount: "100"
                        isActive: true
                        createdAt: "2025-01-01T00:00:00Z"
                        updatedAt: "2026-03-01T00:00:00Z"
                        petName: "小白"
                        petBreed: "英国短毛猫"
                        deviceName: "智能喂食器1号"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/addFeedingDevices:
    post:
      tags:
        - 喂食管理
      summary: 添加喂食设备和计划
      description: 为宠物添加新的喂食设备和喂食计划
      operationId: addFeedingDevices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFeedingDeviceRequest'
            examples:
              addDevice:
                value:
                  key: "unique-auth-key-123"
                  petId: "1"
                  deviceId: "device-002"
                  scheduleTime: "18:00:00"
                  foodAmount: "150"
                  isActive: "1"
                  schedulesInfo: "晚餐喂食"
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/getFeedingRecord:
    get:
      tags:
        - 喂食管理
      summary: 获取喂食记录
      description: 分页查询指定时间段内的喂食记录
      operationId: getFeedingRecord
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: 用户认证密钥
        - name: petId
          in: query
          required: true
          schema:
            type: string
          description: 宠物ID
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 开始时间
          example: "2026-03-01T00:00:00Z"
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 结束时间
          example: "2026-03-02T23:59:59Z"
        - name: page
          in: query
          required: true
          schema:
            type: string
          description: 页码
          example: "1"
        - name: size
          in: query
          required: true
          schema:
            type: string
          description: 每页数量
          example: "10"
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DataListBean_FeedingRecordBean'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/putFeeding:
    post:
      tags:
        - 喂食管理
      summary: 执行喂食操作
      description: 立即触发指定设备对宠物进行喂食
      operationId: putFeeding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutFeedingRequest'
            examples:
              feedNow:
                value:
                  key: "unique-auth-key-123"
                  petId: "1"
                  deviceId: "device-001"
                  plannedAmount: "100"
      responses:
        '200':
          description: 喂食指令发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/getPetHealthHistory:
    get:
      tags:
        - 健康管理
      summary: 获取宠物健康档案
      description: 分页查询指定时间段内的宠物健康记录
      operationId: getPetHealthHistory
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: 用户认证密钥
        - name: petId
          in: query
          required: true
          schema:
            type: string
          description: 宠物ID
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 开始时间
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 结束时间
        - name: page
          in: query
          required: true
          schema:
            type: string
          description: 页码
        - name: size
          in: query
          required: true
          schema:
            type: string
          description: 每页数量
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DataListBean_PetHealthHistory'
              examples:
                success:
                  value:
                    code: "1"
                    message: "查询成功"
                    data:
                      total: 50
                      list:
                        - recordId: "health-001"
                          petId: "1"
                          petName: "小白"
                          petBreed: "英国短毛猫"
                          recordDate: "2026-03-01"
                          bodyWeight: "4.5"
                          bodyTemperature: "38.5"
                          heartRate: "120"
                          respiratoryRate: "30"
                          appetiteLevel: "正常"
                          energyLevel: "活跃"
                          vaccinationStatus: "已接种"
                          lastVaccinationDate: "2025-12-01"
                          dewormingStatus: "已驱虫"
                          lastDewormingDate: "2026-01-15"
                          medicationList: "无"
                          observedSymptoms: "无异常"
                          vetNotes: "健康状况良好"
                          nextCheckupDate: "2026-06-01"
                          createdAt: "2026-03-01T10:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /officelease/pets/getMonitoring:
    get:
      tags:
        - 环境监测
      summary: 获取环境监测数据
      description: 分页查询指定时间段内的环境监测数据
      operationId: getMonitoring
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: 用户认证密钥
        - name: userId
          in: query
          required: true
          schema:
            type: string
          description: 用户ID
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 开始时间
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 结束时间
        - name: page
          in: query
          required: true
          schema:
            type: string
          description: 页码
        - name: size
          in: query
          required: true
          schema:
            type: string
          description: 每页数量
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBean'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DataListBean_MonitoringBean'
              examples:
                success:
                  value:
                    code: "1"
                    message: "查询成功"
                    data:
                      total: 100
                      list:
                        - userId: "123"
                          monitoringTime: "2026-03-02T10:00:00Z"
                          temperature: "22.5"
                          humidity: "55"
                          pm25: "15"
                          co2: "400"
                          tvoc: "50"
                          noiseLevel: "35"
                          lightIntensity: "500"
                          airQuality: "优"
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    ResponseBean:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 业务状态码，1表示成功，其他值表示失败
          example: "1"
        message:
          type: string
          description: 响应消息
          example: "操作成功"
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳
        executeTime:
          type: string
          description: 执行耗时

    DataListBean_FeedingRecordBean:
      type: object
      properties:
        total:
          type: integer
          description: 总记录数
          example: 50
        list:
          type: array
          items:
            $ref: '#/components/schemas/FeedingRecordBean'
          description: 数据列表

    DataListBean_PetHealthHistory:
      type: object
      properties:
        total:
          type: integer
          description: 总记录数
        list:
          type: array
          items:
            $ref: '#/components/schemas/PetHealthHistory'
          description: 数据列表

    DataListBean_MonitoringBean:
      type: object
      properties:
        total:
          type: integer
          description: 总记录数
        list:
          type: array
          items:
            $ref: '#/components/schemas/MonitoringBean'
          description: 数据列表

    UserBean:
      type: object
      required:
        - id
        - userName
        - key
      properties:
        id:
          type: string
          description: 用户ID
        userName:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱地址
        phoneNumber:
          type: string
          description: 手机号码
        homeAddress:
          type: string
          description: 家庭地址
        key:
          type: string
          description: 用户认证密钥

    LoginRequest:
      type: object
      required:
        - userName
        - psd
      properties:
        userName:
          type: string
          description: 用户名
          example: "testuser"
        psd:
          type: string
          format: password
          description: 密码
          example: "password123"

    SetUserinfoRequest:
      type: object
      required:
        - userName
        - password
        - type
      properties:
        userName:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱地址
        phoneNumber:
          type: string
          description: 手机号码
        homeAddress:
          type: string
          description: 家庭地址
        password:
          type: string
          format: password
          description: 密码
        type:
          type: string
          enum: ['0', '1']
          description: 操作类型，0-更新信息，1-修改密码
        key:
          type: string
          description: 用户认证密钥

    PetBean:
      type: object
      properties:
        id:
          type: integer
          description: 宠物ID
        userId:
          type: integer
          description: 所属用户ID
        petName:
          type: string
          description: 宠物名称
        petSpecies:
          type: string
          description: 宠物种类（猫、狗等）
        petBreed:
          type: string
          description: 宠物品种
        petGender:
          type: string
          description: 宠物性别
        birthDate:
          type: string
          format: date
          description: 出生日期
        currentWeight:
          type: number
          format: float
          description: 当前体重（公斤）
        healthStatus:
          type: string
          description: 健康状态
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    UpdatePetsRequest:
      type: object
      required:
        - key
        - id
        - userId
        - petName
        - petSpecies
        - petBreed
        - petGender
        - birthDate
        - currentweight
        - healthstatus
      properties:
        key:
          type: string
          description: 用户认证密钥
        id:
          type: string
          description: 宠物ID
        userId:
          type: string
          description: 用户ID
        petName:
          type: string
          description: 宠物名称
        petSpecies:
          type: string
          description: 宠物种类
        petBreed:
          type: string
          description: 宠物品种
        petGender:
          type: string
          description: 宠物性别
        birthDate:
          type: string
          format: date
          description: 出生日期
        currentweight:
          type: string
          description: 当前体重
        healthstatus:
          type: string
          description: 健康状态

    FeedingSchedulesBean:
      type: object
      properties:
        id:
          type: string
          description: 计划ID
        petId:
          type: string
          description: 宠物ID
        deviceId:
          type: string
          description: 设备ID
        scheduleTime:
          type: string
          format: time
          description: 计划喂食时间
        foodAmount:
          type: string
          description: 食物量（克）
        isActive:
          oneOf:
            - type: boolean
            - type: string
          description: 是否启用
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
        petName:
          type: string
          description: 宠物名称
        petBreed:
          type: string
          description: 宠物品种
        deviceName:
          type: string
          description: 设备名称

    AddFeedingDeviceRequest:
      type: object
      required:
        - key
        - petId
        - deviceId
        - scheduleTime
        - foodAmount
        - isActive
        - schedulesInfo
      properties:
        key:
          type: string
          description: 用户认证密钥
        petId:
          type: string
          description: 宠物ID
        deviceId:
          type: string
          description: 设备ID
        scheduleTime:
          type: string
          format: time
          description: 计划喂食时间
        foodAmount:
          type: string
          description: 食物量（克）
        isActive:
          type: string
          description: 是否启用（1-启用，0-禁用）
        schedulesInfo:
          type: string
          description: 计划说明

    FeedingRecordBean:
      type: object
      properties:
        scheduledTime:
          type: string
          format: date-time
          description: 计划时间
        actualTime:
          type: string
          format: date-time
          description: 实际时间
        plannedAmount:
          type: string
          description: 计划量（克）
        actualAmount:
          type: string
          description: 实际量（克）
        feedStatus:
          type: string
          description: 喂食状态
        feedNotes:
          type: string
          description: 喂食备注
        petBreed:
          type: string
          description: 宠物品种
        petName:
          type: string
          description: 宠物名称
        deviceName:
          type: string
          description: 设备名称

    PutFeedingRequest:
      type: object
      required:
        - key
        - petId
        - deviceId
        - plannedAmount
      properties:
        key:
          type: string
          description: 用户认证密钥
        petId:
          type: string
          description: 宠物ID
        deviceId:
          type: string
          description: 设备ID
        plannedAmount:
          type: string
          description: 计划喂食量（克）

    PetHealthHistory:
      type: object
      properties:
        recordId:
          type: string
          description: 记录ID
        petId:
          type: string
          description: 宠物ID
        petName:
          type: string
          description: 宠物名称
        petBreed:
          type: string
          description: 宠物品种
        recordDate:
          type: string
          format: date
          description: 记录日期
        bodyWeight:
          type: string
          description: 体重（公斤）
        bodyTemperature:
          type: string
          description: 体温（摄氏度）
        heartRate:
          type: string
          description: 心率（次/分钟）
        respiratoryRate:
          type: string
