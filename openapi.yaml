            allOf:
              - $ref: '#/components/schemas/ResponseBean'
              - type: object
                properties:
                  data:
                    type: null
          examples:
            badRequest:
              value:
                code: "400"
                message: "请求参数错误"
                timestamp: "2026-03-02T10:00:00Z"

    Unauthorized:
      description: 认证失败或密钥无效
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ResponseBean'
              - type: object
                properties:
                  data:
                    type: null
          examples:
            unauthorized:
              value:
                code: "401"
                message: "认证失败，请检查key是否有效"
                timestamp: "2026-03-02T10:00:00Z"

    InternalServerError:
